.lang-dropdown button.active{color:#BFA05A}

.hero-sub{font-size:15px;font-weight:300;color:rgba(255,255,255,.55);line-height:1.85;margin-bottom:40px}

.dot-o{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}

async function confirmDirectBook(id, name, price) {
  const nome = document.getElementById('f_nome').value.trim();
  const email = document.getElementById('f_email').value.trim();
  const data = document.getElementById('f_data').value;
  const orario = document.getElementById('f_orario').value;
  if (!nome || !email || !data || !orario) { alert(t('form_alert')); return; }
  const tel = document.getElementById('f_tel').value.trim();
  const persone = document.getElementById('f_persone').value;

  const btn = document.getElementById('btn-pay-now');
  btn.textContent = '…'; btn.disabled = true;

  const amount = price.replace(/[^\d.]/g, '');
  const win = window.open('', '_blank');
  if (win) win.document.write('<p style="font-family:sans-serif;padding:40px;text-align:center;color:#555">Preparazione pagamento…</p>');

  try {
    const res = await fetch(SUMUP_FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUMUP_ANON}` },
      body: JSON.stringify({ amount, description: name, reference: `LS-${id}-${Date.now()}` }),
    });
    const data2 = await res.json();
    if (data2.checkout_url) {
      if (win) win.location.href = data2.checkout_url;
      else window.open(data2.checkout_url, '_blank');
    } else {
      throw new Error(data2.error || 'link non generato');
    }
  } catch (e) {
    const waUrl = `https://wa.me/${WA}?text=${encodeURIComponent(`Vorrei prenotare: ${name} (${price})`)}`;
    if (win) win.location.href = waUrl;
    else window.open(waUrl, '_blank');
  }

  // Save to Supabase + email notification
  const sb = supabase.createClient('https://amixnhmgxbxuiykqndxi.supabase.co', SUMUP_ANON);
  sb.from('requests').insert({ service_id: id, service_name: name, service_price: price, nome, email, telefono: tel || null, data_desiderata: data, orario, persone: parseInt(persone), note: null, status: 'confirmed' }).catch(() => {});
  fetch('https://amixnhmgxbxuiykqndxi.supabase.co/functions/v1/notify-booking', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUMUP_ANON}` }, body: JSON.stringify({ service_name: name, service_price: price, nome, email, telefono: tel || '—', data, orario, persone, note: '—' }) }).catch(() => {});

  closeModal();
}

function openModal(id, name, price) {
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
